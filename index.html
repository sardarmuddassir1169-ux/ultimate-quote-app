<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="container">
    <header>Business Automation Portal</header>
    
    <form id="quoteForm">
        <input type="text" id="custName" placeholder="Customer Name" required>
        <input type="tel" id="custPhone" placeholder="Phone Number" required>
        
        <div class="row">
            <input type="number" id="L" placeholder="Length (ft)" required>
            <input type="number" id="W" placeholder="Width (ft)" required>
        </div>

        <button type="submit" id="calc-btn">Calculate & Save Data</button>
    </form>

    <div id="resultArea" style="display:none; margin-top: 20px; text-align: center;">
        <h3 id="displayPrice"></h3>
        
        <!-- Button 1: PDF -->
        <button id="download-pdf" style="background: #34a853; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;">
           <i class="fas fa-file-pdf"></i> Download Official PDF
        </button>

        <!-- Button 2: WhatsApp -->
        <button id="whatsapp-btn" style="background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;">
           <i class="fab fa-whatsapp"></i> Send Quote to WhatsApp
        </button>
    </div>
</div>
